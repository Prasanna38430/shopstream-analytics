name: 'shopstream'
version: '1.0.0'
config-version: 2

profile: 'shopstream'

model-paths: ["models"]
macro-paths: ["macros"]
test-paths: ["tests"]
seed-paths: ["seeds"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Staging is lightweight cleanup, so views are fine (no storage cost,
# always fresh). Intermediate models are ephemeral - they compile into the
# marts as CTEs rather than creating their own objects. Marts are the
# tables BI tools query, so they're materialized for speed.
models:
  shopstream:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: ephemeral
    marts:
      +materialized: table
      +schema: marts
