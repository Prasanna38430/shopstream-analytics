name: CD

# Runs only after CI succeeds on main, then rebuilds the production models.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
      SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
      SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
      SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Skipped when no Snowflake credentials are configured, so a lapsed
      # warehouse doesn't leave a permanently failing workflow behind.
      - name: Check for Snowflake credentials
        id: creds
        run: |
          if [ -n "$SNOWFLAKE_ACCOUNT" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "No Snowflake credentials set, skipping the deploy."
          fi

      - name: dbt deps
        if: steps.creds.outputs.available == 'true'
        working-directory: dbt/shopstream
        run: dbt deps

      - name: dbt build against production
        if: steps.creds.outputs.available == 'true'
        working-directory: dbt/shopstream
        run: dbt build --target prod --profiles-dir .
